<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yanımda Al - Dijital Refakatçi</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #EBF8FF 0%, #EEF2F6 100%);
            --text-main: #1E293B;
            --text-muted: #64748B;
            --brand-color: #3B82F6;
            --brand-gradient: linear-gradient(135deg, #3B82F6 0%, #1D4ED8 100%);
            --success-color: #10B981;
            --success-gradient: linear-gradient(135deg, #10B981 0%, #047857 100%);
            --warning-color: #EF4444;
            --warning-gradient: linear-gradient(135deg, #EF4444 0%, #B91C1C 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: row;
            /* DEĞİŞTİ */
            font-size: 24px;
        }

        header {
            text-align: center;
            padding: 15px;
            background: var(--card-bg);
            border-bottom: 1px solid #E2E8F0;
        }

        header h1 {
            font-size: 32px;
            font-weight: 800;
            background: var(--brand-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: stretch;
            /* DEĞİŞTİ */
            padding: 20px;
            overflow: hidden;
        }

        .page {
            display: none;
            width: 100%;
            max-width: none;
            /* DEĞİŞTİ */
            background: var(--card-bg);
            border-radius: 28px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 15px 35px rgba(148, 163, 184, 0.12);
            height: 100%;
            flex-direction: column;
        }

        .page.active {
            display: flex;
        }

        .page-title {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 15px;
            color: #0F172A;
            text-align: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 20px;
            font-size: 24px;
            font-weight: 700;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-voice {
            background: var(--brand-gradient);
            color: white;
            box-shadow: 0 8px 16px rgba(59, 130, 246, 0.2);
            width: 100%;
            margin-bottom: 15px;
        }

        .btn-voice.recording {
            background: var(--warning-gradient);
            animation: pulse 1.8s infinite;
        }

        /* YAZI GİRİŞ ALANI GÜNCELLEMESİ */
        .text-input-container {
            display: flex;
            gap: 10px;
            margin-top: 5px;
        }

        .text-input {
            flex: 1;
            padding: 18px;
            font-size: 22px;
            border: 2px solid #E2E8F0;
            border-radius: 18px;
            outline: none;
            color: var(--text-main);
        }

        .text-input:focus {
            border-color: var(--brand-color);
        }

        .btn-send {
            background: var(--brand-color);
            color: white;
            border-radius: 18px;
            padding: 0 25px;
        }

        .btn-success {
            background: var(--success-gradient);
            color: white;
        }

        .btn-neutral {
            background: #F1F5F9;
            color: #475569;
            border: 2px solid #E2E8F0;
        }

        .chat-container {
            flex: 1;
            background: #F8FAFC;
            border-radius: 22px;
            padding: 15px;
            border: 1px solid #E2E8F0;
            margin-bottom: 15px;
            overflow-y: auto;
            min-height: 0;
            /* kritik fix */
        }

        .chat-msg {
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 18px;
            line-height: 1.4;

            display: block;
            width: fit-content;
            max-width: 60%;

            word-break: break-word;
            overflow-wrap: break-word;
        }

        .chat-box {
            display: flex;
            flex-direction: column;
            gap: 10px;

            align-items: stretch;
            /* önemli */
        }

        .msg-ai {
            background: #FFFFFF;
            color: #1E293B;
            border-bottom-left-radius: 4px;
            border: 1px solid #E2E8F0;
            align-self: flex-start;
        }

        .msg-user {
            background: #DCEFFE;
            color: #1E40AF;
            border-bottom-right-radius: 4px;
            align-self: flex-end;
        }

        .routine-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
            flex: 1;
        }

        .routine-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #FFFFFF;
            border: 1px solid #E2E8F0;
            border-radius: 20px;
        }

        .routine-item.done {
            background: #F0FDF4;
            border-color: #BBF7D0;
        }

        nav {
            width: 140px;
            background: #FFFFFF;
            border-right: 2px solid #E2E8F0;
            border-top: none;
            /* kaldır */
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
        }

        .nav-btn {
            flex: none;
            background: none;
            border: none;
            font-size: 18px;
            font-weight: 700;
            color: var(--text-muted);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 12px;
        }

        .nav-btn span:first-child {
            font-size: 32px;
        }

        .nav-btn.active {
            color: var(--brand-color);
            background: #F0F7FF;
            border-top: 4px solid var(--brand-color);
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.02);
            }

            100% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Yanımda Al</h1>
    </header>

    <div class="main-content">
        <!-- 1. SAYFA: SOHBET -->
        <div class="page active" id="page-sohbet">
            <div class="page-title">💬 Refakatçi Sohbeti</div>
            <div class="chat-container" id="chatScroll">
                <div class="chat-box" id="chatBox">
                    <div class="chat-msg msg-ai">Merhaba Ahmet Amca, sesini duymak veya senden haber almak çok güzel.
                        Bugün nasılsın?</div>
                </div>
            </div>

            <!-- Sesli Arayüz Butonu -->
            <button class="btn btn-voice" id="voiceBtn" onclick="toggleVoice()">
                🎤 <span id="btnText">Konuşmak İçin Basın</span>
            </button>

            <!-- YAZILI INTERAKTIF ALAN -->
            <div class="text-input-container">
                <input type="text" id="userInput" class="text-input" placeholder="Buraya yazabilirsiniz..."
                    onkeypress="handleKeyPress(event)">
                <button class="btn btn-send" onclick="sendTextMessage()">Gönder</button>
            </div>
        </div>

        <!-- 2. SAYFA: İLAÇLAR -->
        <div class="page" id="page-ilaclar">
            <div class="page-title">📋 Bugünkü İlaçlarım</div>
            <div class="routine-list">
                <div class="routine-item" id="med1">
                    <div>
                        <strong style="display:block; font-size:22px;">💊 Tansiyon İlacı</strong>
                        <span style="font-size: 16px; color: var(--text-muted);">Sabah • Saat 09:00</span>
                    </div>
                    <button class="btn btn-success" style="width:auto; padding: 10px 20px; font-size: 18px;"
                        onclick="takeMed('med1')">İçtim</button>
                </div>
                <div class="routine-item" id="med2">
                    <div>
                        <strong style="display:block; font-size:22px;">📸 Vitamin Takviyesi</strong>
                        <span style="font-size: 16px; color: var(--text-muted);">Akşam • Saat 20:00</span>
                    </div>
                    <div style="display:flex; gap: 8px;">
                        <button class="btn btn-neutral" style="width:auto; padding: 10px 20px; font-size: 18px;"
                            onclick="simulatePhoto()">Kamerayla Çek</button>
                        <button class="btn btn-success" style="width:auto; padding: 10px 20px; font-size: 18px;"
                            onclick="takeMed('med2')">İçtim</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- 3. SAYFA: DURUM -->
        <div class="page" id="page-durum">
            <div class="page-title">☀️ Günlük Sağlık Kontrolü</div>
            <div id="checkinCard"
                style="text-align: center; display: flex; flex-direction: column; gap: 20px; justify-content: center; height: 100%;">
                <p style="font-weight: 600; font-size: 26px;">Ahmet Amca, bugün kendini nasıl hissediyorsun?</p>
                <button class="btn btn-success" onclick="completeCheckin('Harika!')">😊 Çok İyiyim</button>
                <button class="btn btn-neutral" style="background: #FFFBEB; color: #B45309; border-color: #FDE68A;"
                    onclick="completeCheckin('Biraz halsizim')">😐 Biraz Halsizim</button>
            </div>
        </div>
    </div>

    <nav>
        <button class="nav-btn active" id="nav-sohbet"
            onclick="switchPage('sohbet')"><span>💬</span><span>Sohbet</span></button>
        <button class="nav-btn" id="nav-ilaclar"
            onclick="switchPage('ilaclar')"><span>💊</span><span>İlaçlarım</span></button>
        <button class="nav-btn" id="nav-durum"
            onclick="switchPage('durum')"><span>☀️</span><span>Durumum</span></button>
    </nav>

    <script>
        let isRecording = false;
        let mediaRecorder = null;
        let audioChunks = [];
        let stream = null;

        const voiceBtn = document.getElementById('voiceBtn');
        const btnText = document.getElementById('btnText');
        const chatBox = document.getElementById('chatBox');
        const chatScroll = document.getElementById('chatScroll');
        const userInput = document.getElementById('userInput');

        const API_BASE_URL = "http://127.0.0.1:8000/api";
        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`page-${pageId}`).classList.add('active');
            document.getElementById(`nav-${pageId}`).classList.add('active');
        }

        // 1. Yazılı Mesaj Gönderme Fonksiyonu
        async function sendTextMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Kullanıcı mesajını ekrana bas ve input'u temizle
            addChatMessage(text, "user");
            userInput.value = "";

            try {
                const response = await fetch(`${API_BASE_URL}/text-chat`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ message: text })
                });
                const data = await response.json();
                addChatMessage(data.ai_response, "ai");
            } catch (error) {
                console.error(error);
                addChatMessage("Bağlantı hatası oluştu Ahmet Amca.", "ai");
            }
        }

        function handleKeyPress(event) {
            if (event.key === "Enter") {
                sendTextMessage();
            }
        }

        async function toggleVoice() {

            // KAYDI BAŞLAT
            if (!isRecording) {

                try {

                    stream = await navigator.mediaDevices.getUserMedia({
                        audio: true
                    });

                    audioChunks = [];

                    mediaRecorder = new MediaRecorder(stream);

                    mediaRecorder.ondataavailable = (event) => {
                        if (event.data.size > 0)
                            audioChunks.push(event.data);
                    };

                    mediaRecorder.onstop = async () => {

                        const audioBlob = new Blob(audioChunks, {
                            type: "audio/webm"
                        });

                        console.log("Ses Boyutu:", audioBlob.size);

                        if (audioBlob.size < 1000) {
                            addChatMessage("Ses kaydedilemedi.", "ai");
                            return;
                        }

                        const formData = new FormData();

                        formData.append(
                            "file",
                            audioBlob,
                            "audio.webm"
                        );

                        try {

                            const response = await fetch(
                                `${API_BASE_URL}/voice-chat`,
                                {
                                    method: "POST",
                                    body: formData
                                }
                            );

                            const data = await response.json();

                            addChatMessage(data.user_transcription, "user");
                            addChatMessage(data.ai_response, "ai");

                        } catch (err) {

                            console.error(err);

                            addChatMessage(
                                "Sunucuya bağlanılamadı.",
                                "ai"
                            );
                        }

                        stream.getTracks().forEach(track => track.stop());

                    };

                    mediaRecorder.start();

                    isRecording = true;

                    voiceBtn.classList.add("recording");

                    btnText.innerText = "Dinliyorum...";

                }
                catch (err) {

                    console.error(err);

                    alert("Mikrofona erişim izni verilmedi.");

                }

            }

            // KAYDI DURDUR
            else {

                isRecording = false;

                voiceBtn.classList.remove("recording");

                btnText.innerText = "Konuşmak İçin Basın";

                mediaRecorder.stop();

            }

        }

        function addChatMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `chat-msg msg-${sender}`;
            msgDiv.innerText = text;
            chatBox.appendChild(msgDiv);
            chatScroll.scrollTop = chatScroll.scrollHeight;
        }

        async function completeCheckin(mood) {
            try {
                await fetch(`${API_BASE_URL}/checkin`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ mood: mood })
                });
                document.getElementById('checkinCard').innerHTML = `
                    <span style="font-size: 64px;">✔️</span>
                    <h2 style="color: var(--success-color); font-size: 30px; font-weight: 800;">Durumunuz Bildirildi</h2>
                    <p style="font-size: 20px; color: var(--text-muted); margin-top: 8px;">Aileniz harika olduğunuzu biliyor!</p>
                `;
                addChatMessage(`Günlük sağlık kontrolü yapıldı: ${mood}`, "user");
            } catch (error) { alert("Bağlantı hatası."); }
        }

        async function takeMed(id) {
            try {
                await fetch(`${API_BASE_URL}/medication`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ med_id: id })
                });
                const item = document.getElementById(id);
                item.classList.add('done');
                item.querySelectorAll('button').forEach(btn => btn.style.display = 'none');
                const checkMark = document.createElement('span');
                checkMark.innerText = "✓ Tamamlandı";
                checkMark.style.color = "var(--success-color)";
                checkMark.style.fontWeight = "700";
                item.appendChild(checkMark);
            } catch (error) { alert("Bağlantı hatası."); }
        }

        async function simulatePhoto() {
            const formData = new FormData();
            formData.append("file", new Blob(), "photo.jpg");
            try {
                const response = await fetch(`${API_BASE_URL}/medication/recognize`, { method: "POST", body: formData });
                const data = await response.json();
                alert(`📷 ${data.recognized_med} kutusu başarıyla doğrulandı!`);
                takeMed('med2');
            } catch (error) { alert("Bağlantı hatası."); }
        }
    </script>
</body>

</html>
